include "frontend.conf"

appName="income-tax-financials-frontend"
play.http.router = prod.Routes
play.ws.ssl.enabledProtocols = [
  "TLSv1.2",
  "TLSv1.1"
]

play.i18n.langCookieHttpOnly = true
play.i18n.langs = ["en", "cy"]

play.filters.enabled += play.filters.csp.CSPFilter

# Custom error handler
play.http.errorHandler = "common.config.ItvcErrorHandler"

# Play Modules
# ~~~~
play.modules.enabled += "common.config.DIModule"
play.modules.enabled += "uk.gov.hmrc.play.bootstrap.HttpClientV2Module"
play.modules.enabled += "uk.gov.hmrc.play.bootstrap.AuthModule"
play.modules.enabled += "uk.gov.hmrc.mongo.play.PlayMongoModule"
# retry mechanism in http-verbs handles "SSLEngine closed already" exceptions
http-verbs.retries.ssl-engine-closed-already.enabled = true

# Secret key
# ~~~~~
# The secret key is used to secure cryptographics functions.
# If you deploy your application to several instances be sure to use the same key!
# Not set here so that MDTP frontends share the same secret key in the local environment
# (see common.conf in frontend-bootstrap).
# In server environments the secret comes from app-config-common
# play.crypto.secret="I28h0dBysYRW6m1z3z4sLOLCoiXPg286ON5VwwRjSrmnJaBhjgWVtDNe41edoo0s"

# Frontend Bootsteap Session Timeout Settings
# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
# A custom session timeout can be set here for testing, but should be left at the default
# which is 15 minutes in production. Hence is commented out, unless required.

# session.timeoutSeconds = 20
mongodb.timeToLiveInSeconds = 900

play.http.parser.maxMemoryBuffer = 325kB

microservice {

    services {

      auth {
        host = localhost
        port = 8500
      }

      contact-frontend {
        host = localhost
        port = 9250
      }

      income-tax-calculation {
        host = localhost
        port = 9314
      }

      income-tax-obligations {
        host = localhost
        port = 9076
      }

      income-tax-financial-details {
        host = localhost
        port = 9090
      }

      itvc-dynamic-stub {
        host = localhost
        port = 65535
      }

      citizen-details {
        host = localhost
        port = 9337
      }

      pay-api {
        host = localhost
        port = 9057
      }

      non-repudiation {
        host = localhost
        port = 11311
        xApiKey = "QZmV20DwfSKvqJ30SpkINp33"
        numberOfRetries = 10
      }

      set-up-a-payment-plan {
        host = localhost
        port = 9216
      }

      repayment-api {
        host = localhost
        port = 9172
      }

      income-tax-session-data {
        host = localhost
        port = 30027
      }

      agent-services-account-frontend {
         host = localhost
         port = 9401
       }

      income-tax-business-details {
         host = localhost
         port = 9089
       }
     }
 }

# This config should replicate whats in production.
# so that helps to Prod features button on test-only/feature-switch page.
# We use test-only/feature-switch page for tweaking feature switches.
feature-switch {
  enable-charge-history = false
  enable-credits-refunds-repay = true
  enable-payment-history-refunds = false
  enable-penalties-and-appeals = true
  enable-session-data-storage = false
  enable-self-serve-time-to-pay-r17 = false
  enable-time-machine = true
  enable-triggered-migration = true
  enable-submit-claim-to-adjust-to-nrs = true
  enable-no-income-sources-redirect = false
  enable-obligations-frontend = false
  enable-business-details-frontend = false
}

#  Keep this false for local environment
#  When true, the application attempts to call mongo for all feature switches
#  This results in a lot of tests failing
#  In the Staging Environment, this will be flipped to true
#  Therefore changing the state of FS(s) will be easier during demos
feature-switches {
  read-from-mongo = true
}

mongodb {
   uri = "mongodb://localhost:27017/income-tax-financials-frontend"
}

enrolments {
  mtd {
    key = "HMRC-MTD-IT"
    identifier = "MTDITID"
  }

  nino {
    key = "HMRC-NI"
    identifier = "NINO"
  }

  sa {
    key = "IR-SA"
    identifier = "UTR"
  }

  arn {
    key = "HMRC-AS-AGENT"
    identifier = "AgentReferenceNumber"
  }
}

